<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#F7F5FB;padding:24px 0;">
  <tr>
    <td align="center">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:680px;background:#FFFFFF;border-radius:24px;overflow:hidden;border:1px solid #ECE7F5;">
        <tr>
          <td style="padding:48px 48px 0;text-align:center;">
            <table role="presentation" cellpadding="0" cellspacing="0" align="center" style="margin:0 auto 18px;">
              <tr>
                <td style="background:rgba(220,38,38,0.1);border-radius:999px;padding:8px 16px;">
                  <span style="font-family:-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#DC2626;">Account</span>
                </td>
              </tr>
            </table>

            <h1 style="margin:0 0 14px;font-family:-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:28px;font-weight:700;color:#1B1730;letter-spacing:-0.5px;line-height:1.25;">
              {{TITLE}}
            </h1>
            <p style="margin:0;font-family:-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:16px;color:#6B6480;line-height:1.7;">
              Hi {{DISPLAY_NAME}}, {{BODY}}
            </p>
          </td>
        </tr>

        <tr><td style="height:30px;line-height:30px;font-size:30px;">&nbsp;</td></tr>

        <tr>
          <td style="padding:0 48px;">
            <table width="100%" cellpadding="0" cellspacing="0" style="background:rgba(220,38,38,0.06);border-radius:16px;border:1px solid rgba(220,38,38,0.16);">
              <tr>
                <td style="padding:18px 20px;">
                  <p style="margin:0;font-family:-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:14px;color:#5B5470;line-height:1.6;">
                    <strong style="color:#DC2626;">Wasn't you?</strong> Contact support immediately so we can help secure your account.
                  </p>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <tr><td style="height:40px;line-height:40px;font-size:40px;">&nbsp;</td></tr>

        <tr>
          <td style="padding:0 48px 48px;">
            <table width="100%" cellpadding="0" cellspacing="0" style="border-top:1px solid #EDEAF5;">
              <tr>
                <td style="padding-top:20px;">
                  <p style="margin:0;font-family:-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:12px;color:#9791AC;line-height:1.6;">
                    All active sessions were signed out.
                  </p>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
