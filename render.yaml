services:
  - type: web
    name: mirage-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health/ready
    autoDeployTrigger: commit
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Database__ApplyMigrationsOnStartup
        value: "true"
      - key: Database__MaxPoolSize
        value: "15"
      - key: Database__CommandTimeoutSeconds
        value: "30"
      - key: DATABASE_URL
        sync: false
      - key: Jwt__SigningKey
        sync: false
      - key: Jwt__Issuer
        value: mirage-api
      - key: Jwt__Audience
        value: mirage-client
      - key: Jwt__AccessTokenMinutes
        value: "15"
      - key: Jwt__RefreshTokenDays
        value: "30"
      - key: Swagger__Enabled
        value: "true"
