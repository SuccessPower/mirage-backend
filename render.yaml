services:
  - type: web
    name: mirage-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    preDeployCommand: dotnet Mirage.Api.dll --migrate
    healthCheckPath: /health/ready
    autoDeployTrigger: commit
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Database__ApplyMigrationsOnStartup
        value: "false"
      - key: Database__MaxPoolSize
        value: "15"
      - key: DATABASE_URL
        sync: false
      - key: Jwt__SigningKey
        generateValue: true
      - key: Jwt__Issuer
        value: mirage-api
      - key: Jwt__Audience
        value: mirage-client
      - key: Cors__AllowedOrigins__0
        sync: false
